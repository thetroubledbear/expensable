name: Deploy Web + Mobile

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/mobile/**'
      - '.github/workflows/**'
  workflow_dispatch:

# ─── Detect which apps changed ─────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.diff.outputs.web }}
      mobile: ${{ steps.diff.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        run: |
          BASE="${{ github.event.before }}"
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE="HEAD~1"
          fi
          if git diff --name-only "$BASE" HEAD | grep -q '^apps/web/'; then
            echo "web=true" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only "$BASE" HEAD | grep -q '^apps/mobile/'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
          fi
          # workflow_dispatch: treat all apps as changed
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "web=true" >> $GITHUB_OUTPUT
            echo "mobile=true" >> $GITHUB_OUTPUT
          fi

# ─── Staging (develop only — auto, no approval) ───────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: changes
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Vercel CLI
        if: needs.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Deploy Web (staging)
        if: needs.changes.outputs.web == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.mobile == 'true'
        with:
          node-version: 18

      - name: Install Expo tools
        if: needs.changes.outputs.mobile == 'true'
        run: npm install -g eas-cli@latest

      - name: Install Mobile deps
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && npm install

      - name: Build Android (staging)
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && eas build --platform android --profile staging --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

# ─── Production ───────────────────────────────────────────────────────────────
#  • develop push: runs after staging succeeds, then waits for approval
#  • main push / workflow_dispatch: runs directly, still waits for approval
#  Approval gate: Settings → Environments → production → Required reviewers
# ──────────────────────────────────────────────────────────────────────────────
  deploy-production:
    if: |
      always() &&
      needs.changes.result == 'success' &&
      (
        github.ref == 'refs/heads/main' ||
        github.event_name == 'workflow_dispatch' ||
        (github.ref == 'refs/heads/develop' && needs.deploy-staging.result == 'success')
      )
    needs: [changes, deploy-staging]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install Vercel CLI
        if: needs.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Deploy Web (production)
        if: needs.changes.outputs.web == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      - uses: actions/setup-node@v4
        if: needs.changes.outputs.mobile == 'true'
        with:
          node-version: 18

      - name: Install Expo tools
        if: needs.changes.outputs.mobile == 'true'
        run: npm install -g eas-cli@latest

      - name: Install Mobile deps
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && npm install

      - name: Build Android (production)
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
