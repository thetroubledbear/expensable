name: Deploy Web + Mobile

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/mobile/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'staging' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # -------------------
      # Detect changes
      # -------------------
      - name: Detect changes
        id: changes
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^apps/web/'; then
            echo "web=true" >> $GITHUB_OUTPUT
          fi

          if git diff --name-only HEAD~1 HEAD | grep -q '^apps/mobile/'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
          fi

      # ===================
      # WEB (Vercel)
      # ===================
      - name: Install Vercel CLI
        if: steps.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Pull Vercel config
        if: steps.changes.outputs.web == 'true'
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi

      - name: Build Web
        if: steps.changes.outputs.web == 'true'
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Web
        if: steps.changes.outputs.web == 'true'
        run: |
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi

      # ===================
      # MOBILE (Expo Android)
      # ===================
      - name: Setup Node
        if: steps.changes.outputs.mobile == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Mobile deps
        if: steps.changes.outputs.mobile == 'true'
        run: |
          cd apps/mobile
          npm install

      - name: Install Expo tools
        if: steps.changes.outputs.mobile == 'true'
        run: npm install -g expo-cli eas-cli

      - name: Build Android App
        if: steps.changes.outputs.mobile == 'true'
        run: |
          cd apps/mobile
          if [ "${GITHUB_REF}" == "refs/heads/main" ]; then
            eas build --platform android --profile production --non-interactive
          else
            eas build --platform android --profile staging --non-interactive
          fi
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
