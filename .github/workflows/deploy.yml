name: Deploy Web + Mobile

on:
  push:
    branches: [main, develop]
    paths:
      - 'apps/web/**'
      - 'apps/mobile/**'

# ─── Detect which apps changed ─────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.diff.outputs.web }}
      mobile: ${{ steps.diff.outputs.mobile }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2
      - id: diff
        run: |
          if git diff --name-only HEAD~1 HEAD | grep -q '^apps/web/'; then
            echo "web=true" >> $GITHUB_OUTPUT
          fi
          if git diff --name-only HEAD~1 HEAD | grep -q '^apps/mobile/'; then
            echo "mobile=true" >> $GITHUB_OUTPUT
          fi

# ─── Staging (develop branch, no review needed) ────────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    needs: changes
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Web
      - name: Install Vercel CLI
        if: needs.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Deploy Web (staging)
        if: needs.changes.outputs.web == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # Mobile
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.mobile == 'true'
        with:
          node-version: 18

      - name: Install Expo tools
        if: needs.changes.outputs.mobile == 'true'
        run: npm install -g expo-cli eas-cli

      - name: Install Mobile deps
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && npm install

      - name: Build Android (staging)
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && eas build --platform android --profile staging --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

# ─── Production (main branch, requires reviewer approval) ──────────────────────
  deploy-production:
    if: github.ref == 'refs/heads/main'
    needs: changes
    runs-on: ubuntu-latest
    environment: production   # <-- GitHub pauses here until a reviewer approves

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Web
      - name: Install Vercel CLI
        if: needs.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Deploy Web (production)
        if: needs.changes.outputs.web == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # Mobile
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.mobile == 'true'
        with:
          node-version: 18

      - name: Install Expo tools
        if: needs.changes.outputs.mobile == 'true'
        run: npm install -g expo-cli eas-cli

      - name: Install Mobile deps
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && npm install

      - name: Build Android (production)
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
