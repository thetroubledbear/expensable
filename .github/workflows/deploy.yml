name: Deploy Landing + Web + Mobile

on:
  push:
    branches: [main, dev]
    paths:
      - 'apps/landing/**'
      - 'apps/web/**'
      - 'apps/mobile/**'
      - 'packages/**'
      - '.github/workflows/**'
  workflow_dispatch:

# ─── Detect what changed ───────────────────────────────────────────────────────
jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      landing: ${{ steps.diff.outputs.landing }}
      web: ${{ steps.diff.outputs.web }}
      mobile_build: ${{ steps.diff.outputs.mobile_build }}
      mobile_update: ${{ steps.diff.outputs.mobile_update }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: diff
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "landing=true"       >> $GITHUB_OUTPUT
            echo "web=true"           >> $GITHUB_OUTPUT
            echo "mobile_build=true"  >> $GITHUB_OUTPUT
            exit 0
          fi

          BASE="${{ github.event.before }}"
          if [ "$BASE" = "0000000000000000000000000000000000000000" ] || [ -z "$BASE" ]; then
            BASE="HEAD~1"
          fi

          CHANGED=$(git diff --name-only "$BASE" HEAD)

          # Landing
          if echo "$CHANGED" | grep -qE '^(apps/landing/|packages/)'; then
            echo "landing=true" >> $GITHUB_OUTPUT
          fi

          # Web
          if echo "$CHANGED" | grep -qE '^(apps/web/|packages/)'; then
            echo "web=true" >> $GITHUB_OUTPUT
          fi

          # Mobile — native files require full APK build
          if echo "$CHANGED" | grep -qE '^apps/mobile/(android/|ios/|package\.json|app\.json|app\.config\.(js|ts)|eas\.json|package-lock\.json)'; then
            echo "mobile_build=true" >> $GITHUB_OUTPUT
          # Mobile — JS/TS only, OTA update is enough
          elif echo "$CHANGED" | grep -q '^apps/mobile/'; then
            echo "mobile_update=true" >> $GITHUB_OUTPUT
          fi

# ─── Staging (dev only — auto) ────────────────────────────────────────────────
  deploy-staging:
    if: github.ref == 'refs/heads/dev'
    needs: changes
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Landing ──
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.landing == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI (landing)
        if: needs.changes.outputs.landing == 'true'
        run: npm install -g vercel

      - name: Deploy Landing (staging)
        if: needs.changes.outputs.landing == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # ── Web ──
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.web == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI (web)
        if: needs.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Deploy Web (staging)
        if: needs.changes.outputs.web == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}

      # ── Mobile ──
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.mobile_build == 'true' || needs.changes.outputs.mobile_update == 'true'
        with:
          node-version: 20

      - name: Install EAS CLI
        if: needs.changes.outputs.mobile_build == 'true' || needs.changes.outputs.mobile_update == 'true'
        run: npm install -g eas-cli@latest

      - name: Install mobile deps
        if: needs.changes.outputs.mobile_build == 'true' || needs.changes.outputs.mobile_update == 'true'
        run: cd apps/mobile && npm install

      - name: Build Android APK (staging)
        if: needs.changes.outputs.mobile_build == 'true'
        run: cd apps/mobile && eas build --platform android --profile staging --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'

      - name: Push OTA update (staging)
        if: needs.changes.outputs.mobile_update == 'true'
        run: cd apps/mobile && eas update --branch staging --message "Deploy from CI" --clear-cache
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'

# ─── Production (approval required) ───────────────────────────────────────────
  deploy-production:
    if: always() && needs.changes.result == 'success' && (github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch' || (github.ref == 'refs/heads/dev' && needs['deploy-staging'].result == 'success'))
    needs: [changes, deploy-staging]
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # ── Landing ──
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.landing == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI (landing)
        if: needs.changes.outputs.landing == 'true'
        run: npm install -g vercel

      - name: Deploy Landing (production)
        if: needs.changes.outputs.landing == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_LANDING_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ── Web ──
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.web == 'true'
        with:
          node-version: 22

      - name: Install Vercel CLI (web)
        if: needs.changes.outputs.web == 'true'
        run: npm install -g vercel

      - name: Deploy Web (production)
        if: needs.changes.outputs.web == 'true'
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}

      # ── Mobile ──
      - uses: actions/setup-node@v4
        if: needs.changes.outputs.mobile_build == 'true' || needs.changes.outputs.mobile_update == 'true'
        with:
          node-version: 20

      - name: Install EAS CLI
        if: needs.changes.outputs.mobile_build == 'true' || needs.changes.outputs.mobile_update == 'true'
        run: npm install -g eas-cli@latest

      - name: Install mobile deps
        if: needs.changes.outputs.mobile_build == 'true' || needs.changes.outputs.mobile_update == 'true'
        run: cd apps/mobile && npm install

      - name: Build Android APK (production)
        if: needs.changes.outputs.mobile_build == 'true'
        run: cd apps/mobile && eas build --platform android --profile production --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'

      - name: Push OTA update (production)
        if: needs.changes.outputs.mobile_update == 'true'
        run: cd apps/mobile && eas update --branch production --clear-cache --message "Clear cache rebuild"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'
